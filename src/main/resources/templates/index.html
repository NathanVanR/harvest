<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YieldShare - Local Harvest</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans antialiased">

<main class="min-h-screen max-w-md mx-auto bg-white border-x border-slate-200 flex flex-col relative shadow-sm">

    <header class="bg-emerald-600 text-white p-4 sticky top-0 z-10 shadow-sm">
        <h1 class="text-xl font-bold tracking-tight" th:text="${appName}">YieldShare</h1>
        <p class="text-xs text-emerald-100">Directly from small-scale local growers</p>
    </header>

    <div class="flex-1 p-4 space-y-4 overflow-y-auto pb-24">

        <div class="bg-emerald-50 border border-emerald-100 p-4 rounded-xl text-center">
            <h2 class="font-semibold text-emerald-800 text-sm">Welcome to YieldShare Sandbox</h2>
            <p class="text-xs text-emerald-600 mt-1">Java backend is rendering this template directly via Thymeleaf.</p>
        </div>

        <div class="border border-slate-100 rounded-xl p-3 shadow-sm bg-white space-y-2">
            <div class="h-32 bg-slate-100 rounded-lg flex items-center justify-center text-slate-400 text-xs font-medium">
                [ Produce Photo Placeholder ]
            </div>
            <div class="flex justify-between items-start">
                <div>
                    <h3 class="font-bold text-slate-800 text-sm">Organic Spinach</h3>
                    <p class="text-xs text-slate-400">Seller: Thabo M.</p>
                </div>
                <span class="bg-emerald-100 text-emerald-800 text-xs font-bold px-2 py-1 rounded">R15.00</span>
            </div>
            <button class="w-full bg-slate-900 text-white text-xs font-medium py-2 rounded-lg active:scale-[0.98] transition-transform">
                Reserve Bunch
            </button>
        </div>

    </div>

    <nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white border-t border-slate-200 h-16 flex items-center justify-around px-6 z-10">
        <button class="text-emerald-600 font-semibold text-xs flex flex-col items-center">
            <span>Browse</span>
        </button>
        <button class="text-slate-400 font-medium text-xs flex flex-col items-center">
            <span>Dashboard</span>
        </button>
    </nav>

</main>

</body>
</html>
